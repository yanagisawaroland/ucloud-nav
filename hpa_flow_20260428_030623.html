<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HPA 自动扩缩容 · 流程动态图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f4f6f9;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 16px 56px;color:#1e2430;
}
h1{font-size:22px;font-weight:700;margin-bottom:6px;text-align:center;letter-spacing:.6px}
.sub{font-size:13px;color:#8a9ab0;margin-bottom:20px;text-align:center}

/* controls */
.ctrl{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-bottom:22px;align-items:center}
.btn{padding:7px 18px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;transition:all .18s;letter-spacing:.3px}
.btn-play{background:#2d7dd2;color:#fff}.btn-play:hover{background:#1a5da8}
.btn-step{background:#fff;color:#3a4a5c;border:1.2px solid #d0d8e4}.btn-step:hover{background:#eaf1fb;border-color:#2d7dd2}
.btn-reset{background:#f0f3f7;color:#5a6a7a;border:1.2px solid #d0d8e4}.btn-reset:hover{background:#e0e8f0}
.sp-lbl{font-size:12px;color:#8a9ab0}
.scenario-wrap{display:flex;gap:8px;align-items:center;margin-left:8px}
.sc-btn{padding:5px 13px;border-radius:6px;border:1.2px solid #d0d8e4;background:#fff;font-size:12px;cursor:pointer;color:#3a4a5c;transition:all .15s}
.sc-btn.on{background:#2d7dd2;color:#fff;border-color:#2d7dd2}

/* canvas */
.canvas-wrap{
  background:#fff;border-radius:16px;
  box-shadow:0 3px 20px rgba(0,0,0,.09);
  padding:28px 24px 24px;
  width:100%;max-width:860px;overflow-x:auto;
}

/* dots */
.dots{display:flex;gap:7px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.dot{width:11px;height:11px;border-radius:50%;background:#dde3ec;cursor:pointer;transition:background .25s}
.dot.active{background:#2d7dd2}

/* info bar */
.info{margin-top:14px;font-size:13px;color:#5a6a7a;text-align:center;min-height:22px;transition:color .3s;max-width:820px;line-height:1.7}

/* SVG node animation */
.ng{opacity:0;transition:opacity .45s ease,transform .45s ease;transform:translateY(10px)}
.ng.vis{opacity:1;transform:translateY(0)}
.cg{opacity:0;transition:opacity .35s ease}
.cg.vis{opacity:1}

/* metric bar animation */
@keyframes barGrow{from{width:0}to{width:var(--tw)}}
.bar-anim{animation:barGrow .6s ease forwards}

/* pulse ring on active pod */
@keyframes pulse{0%{r:18;opacity:.6}100%{r:26;opacity:0}}
.pulse-ring{animation:pulse 1.1s ease-out infinite}
</style>
</head>
<body>

<h1>Kubernetes HPA 自动扩缩容</h1>
<p class="sub">指标采集 → 计算副本数 → 扩缩容执行 · 流程动态图</p>

<div class="ctrl">

  <button class="btn btn-step" onclick="stepFwd()">→ 下一步</button>
  <button class="btn btn-step" onclick="stepBk()">← 上一步</button>
  <button class="btn btn-reset" onclick="resetAnim()">↺ 重置</button>
  <span class="sp-lbl">速度</span>
  <button class="btn btn-step" onclick="setSpd(1400)">慢</button>
  <button class="btn btn-step" onclick="setSpd(800)">中</button>
  <button class="btn btn-step" onclick="setSpd(380)">快</button>
  <div class="scenario-wrap">
    <span class="sp-lbl">场景</span>
    <button class="sc-btn on" id="sc0" onclick="setScene(0)">扩容</button>
    <button class="sc-btn"    id="sc1" onclick="setScene(1)">缩容</button>
    <button class="sc-btn"    id="sc2" onclick="setScene(2)">稳定</button>
  </div>
</div>

<script>
// ── scene data ──
const SCENES = {
  0: { // scale out
    cpu:82, mem:70, qps:1200,
    cpuTarget:60, memTarget:70, qpsTarget:800,
    currentR:2, desiredR:5,
    calcText:'ceil(2 × 82% / 60%) = ceil(2.73) = 3 → 合并取最大 → desiredReplicas = 5',
    scaleType:'out',
    podActive:[0,1,2,3,4],
    podLabel:'扩容至5副本（新增3个Pod）'
  },
  1: { // scale in
    cpu:18, mem:22, qps:200,
    cpuTarget:60, memTarget:70, qpsTarget:800,
    currentR:6, desiredR:2,
    calcText:'ceil(6 × 18% / 60%) = ceil(1.8) = 2 → 稳定窗口5min后 → desiredReplicas = 2',
    scaleType:'in',
    podActive:[0,1],
    podLabel:'缩容至2副本（回收4个Pod）'
  },
  2: { // stable
    cpu:55, mem:60, qps:750,
    cpuTarget:60, memTarget:70, qpsTarget:800,
    currentR:3, desiredR:3,
    calcText:'ceil(3 × 55% / 60%) = ceil(2.75) = 3 → 与当前相同 → 无需扩缩容',
    scaleType:'stable',
    podActive:[0,1,2],
    podLabel:'维持3副本（指标平稳）'
  }
};

const STEPS = [
  {ids:['s0'],          conn:null,  info:'【流量入口】外部HTTP请求、消息队列积压或定时任务触发，成为HPA感知负载变化的源头'},
  {ids:['s1'],          conn:'c01', info:'【指标采集】Metrics Server每15s从kubelet拉取资源指标；Prometheus可采集自定义业务指标；Custom Metrics API统一抽象'},
  {ids:['s2'],          conn:'c12', info:'【三类指标】CPU/内存使用率（资源指标）、QPS/延迟（自定义指标）——指标值与目标值的比率驱动副本数变化'},
  {ids:['s3'],          conn:'c23', info:'【HPA Controller】kube-controller-manager中的HPA控制器，每15s轮询一次；扩容防抖3min，缩容防抖5min，防止抖动'},
  {ids:['s4'],          conn:'c34', info:'【副本数计算】核心公式：desiredReplicas = ceil(currentReplicas × currentMetric / targetMetric)，多指标取最大值'},
  {ids:['s5'],          conn:'c45', info:'【扩/缩容判断】desired > current → 立即扩容；desired < current → 等待5min稳定窗口后缩容，避免误操作'},
  {ids:['s6'],          conn:'c56', info:'【执行变更】扩容：更新Deployment.spec.replicas → ReplicaSet创建新Pod → Scheduler调度 → Pod就绪后纳入服务\n缩容：标记Pod Terminating → 等待PreStop钩子 → 30s优雅退出'},
  {ids:['s7'],          conn:'c67', info:'【Pod状态】绿色=Running，橙色=新增/终止中。副本就绪后流量自动接入，负载均摊'},
  {ids:['s8'],          conn:null,  info:'【闭环反馈】扩缩容后指标回落，HPA持续监控形成自动调节闭环。配合PDB(Pod Disruption Budget)保证可用性下限'}
];

let cur=-1, playing=false, timer=null, spd=900, scene=0;

const dotsEl=document.getElementById('dots');
const infoEl=document.getElementById('info');
const btnPlay=document.getElementById('btnPlay');

STEPS.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot';d.onclick=()=>jumpTo(i);dotsEl.appendChild(d);
});

function updDots(){dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));}

function applySceneMetrics(sc){
  const s=SCENES[sc];
  const cpuW=Math.round(s.cpu/100*120);
  const memW=Math.round(s.mem/100*120);
  const qpsW=Math.min(Math.round(s.qps/2000*120),120);
  const bcpu=document.getElementById('bar-cpu');
  const bmem=document.getElementById('bar-mem');
  const bqps=document.getElementById('bar-qps');
  bcpu.style.setProperty('--tw',cpuW+'px');bcpu.style.width='0';
  bmem.style.setProperty('--tw',memW+'px');bmem.style.width='0';
  bqps.style.setProperty('--tw',qpsW+'px');bqps.style.width='0';
  setTimeout(()=>{
    bcpu.classList.add('bar-anim');bcpu.style.width=cpuW+'px';
    bmem.classList.add('bar-anim');bmem.style.width=memW+'px';
    bqps.classList.add('bar-anim');bqps.style.width=qpsW+'px';
  },100);
  document.getElementById('lbl-cpu').textContent=s.cpu+'%';
  document.getElementById('lbl-mem').textContent=s.mem+'%';
  document.getElementById('lbl-qps').textContent=s.qps+' rps';
  document.getElementById('calc-result').textContent=s.calcText;
}

function applyPods(sc){
  const s=SCENES[sc];
  const active=s.podActive;
  for(let i=0;i<8;i++){
    const p=document.getElementById('pod'+(i+1));
    if(!p)continue;
    if(active.includes(i)){
      p.setAttribute('fill',s.scaleType==='in'?'#2d7dd2':'#1a9450');
      p.setAttribute('opacity','1');
    } else {
      p.setAttribute('fill','#d0d8e4');p.setAttribute('opacity','0.35');
    }
  }
  document.getElementById('pod-label').textContent=s.podLabel;
}

function showStep(idx){
  if(idx<0||idx>=STEPS.length)return;
  const st=STEPS[idx];
  st.ids.forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.classList.add('vis');
  });
  if(st.conn){const el=document.getElementById(st.conn);if(el)el.classList.add('vis');}
  if(idx===2)applySceneMetrics(scene);
  if(idx===4){document.getElementById('calc-result').textContent=SCENES[scene].calcText;}
  if(idx===7)applyPods(scene);
  infoEl.textContent=st.info;
  cur=idx;updDots();
}

function jumpTo(idx){
  if(idx<=cur)return;
  for(let i=cur+1;i<=idx;i++)showStep(i);
}

function stepFwd(){stopPlay();if(cur<STEPS.length-1)showStep(cur+1);}
function stepBk(){
  stopPlay();
  if(cur<=0){resetAnim();return;}
  const t=cur-1;resetAnim(true);
  for(let i=0;i<=t;i++)showStep(i);
}

function resetAnim(silent){
  stopPlay();
  document.querySelectorAll('.ng,.cg').forEach(el=>el.classList.remove('vis'));
  ['bar-cpu','bar-mem','bar-qps'].forEach(id=>{
    const el=document.getElementById(id);if(el){el.style.width='0';el.classList.remove('bar-anim');}
  });
  document.getElementById('calc-result').textContent='等待计算...';
  document.getElementById('pod-label').textContent='当前2副本运行中';
  for(let i=1;i<=8;i++){
    const p=document.getElementById('pod'+i);
    if(p){p.setAttribute('fill',i<=2?'#1a9450':'#e8a020');p.setAttribute('opacity',i<=2?'1':'0.3');}
  }
  cur=-1;updDots();
  if(!silent)infoEl.textContent='选择场景后点击「播放动画」，或逐步查看每个流程节点';
}

function togglePlay(){
  if(playing)stopPlay();else startPlay();
}
function startPlay(){
  playing=true;btnPlay.textContent='⏸ 暂停';
  function nx(){
    if(cur>=STEPS.length-1){stopPlay();return;}
    showStep(cur+1);timer=setTimeout(nx,spd);
  }
  timer=setTimeout(nx,cur===-1?200:spd);
}
function stopPlay(){playing=false;clearTimeout(timer);btnPlay.textContent='▶ 播放动画';}
function setSpd(ms){spd=ms;}

function setScene(n){
  scene=n;
  document.querySelectorAll('.sc-btn').forEach((b,i)=>b.classList.toggle('on',i===n));
  resetAnim(false);
}
</script>
</body>
</html>

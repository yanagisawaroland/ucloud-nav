<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>新疆政权全史动态图 | 喀喇汗·阿古柏·准噶尔等</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f5f7fb; font-family: 'Segoe UI', system-ui; }
        .btn-shad {
            @apply px-4 py-2 rounded-xl text-sm font-medium shadow-sm transition-all duration-300 ease-in-out;
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #1e293b;
        }
        .btn-shad:hover { background-color: #e2e8f0; transform: translateY(-2px); box-shadow: 0 6px 12px -6px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #3b82f6; border-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }
        .timeline-bar-highlight {
            filter: drop-shadow(0 0 6px #f59e0b);
            transition: all 0.3s ease-in-out;
        }
        .card-detail {
            background: linear-gradient(115deg, #ffffff 0%, #fffaf0 100%);
            border-left: 6px solid #f59e0b;
        }
        /* 滚动条美化 */
        .timeline-scroll::-webkit-scrollbar { height: 8px; width: 8px; }
        .timeline-scroll::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
        .timeline-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-7xl mx-auto bg-white rounded-3xl shadow-xl border border-gray-200 p-6 md:p-8">
        <div class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl font-extrabold bg-gradient-to-r from-amber-800 to-stone-700 bg-clip-text text-transparent">🏔 新疆地区政权全景动态图</h1>
            <p class="text-gray-500 mt-2">从匈奴、喀喇汗到新中国 · 手动/自动漫游历史</p>
            <div class="w-28 h-1 bg-amber-500 mx-auto mt-3 rounded-full"></div>
        </div>

        <!-- 可滚动的时间轴甘特图容器 -->
        <div class="timeline-scroll overflow-x-auto overflow-y-auto max-h-[520px] border border-gray-200 rounded-2xl bg-gray-50/40 p-3">
            <canvas id="timelineCanvas" width="1300" height="800" style="min-width: 1100px; width: 100%; height: auto; background: #fffef7; border-radius: 20px;"></canvas>
        </div>

        <!-- 控制按钮组 -->
        <div class="flex flex-wrap justify-center gap-3 mt-8">
            <button id="prevBtn" class="btn-shad flex items-center gap-1">← 上一个政权</button>
            <button id="nextBtn" class="btn-shad flex items-center gap-1">下一个政权 →</button>
            <button id="playBtn" class="btn-shad btn-primary flex items-center gap-1">▶ 自动播放 (2s)</button>
            <button id="resetBtn" class="btn-shad flex items-center gap-1">重置</button>
        </div>
        <div class="text-center text-sm text-gray-500 mt-2" id="stepIndicator"></div>

        <!-- 详情卡片 + 逻辑关系简述 -->
        <div id="detailCard" class="card-detail mt-6 p-5 rounded-2xl shadow-md transition-all duration-300">
            <!-- 动态填充 -->
        </div>
        <div class="mt-6 text-xs text-gray-400 border-t pt-4 flex flex-wrap justify-between gap-2">
            <span>📌 时间轴宽度按比例映射（公元前200年~2025年）</span>
            <span>🔗 箭头示意: ▸ 继承/征服关系 → 具体见右侧卡片说明</span>
            <span>✅ 包含：喀喇汗王朝、阿古柏哲德沙尔政权等全部重要政权</span>
        </div>
    </div>

    <script>
        // --------------------------------------------------------------
        // 完整政权数据集（按时间升序，BC年份用负数）
        // 补充：喀喇汗王朝 (840-1212) + 阿古柏 (1865-1877)
        // --------------------------------------------------------------
        const dynasties = [
            { name: "匈奴汗国", start: -209, end: 93, color: "#8B5A2B", desc: "称雄漠北，控制西域大部，设僮仆都尉。", detail: "冒顿单于时期最强，后南北分裂，对西域诸国征税。" },
            { name: "秦汉 / 西域都护", start: -202, end: 220, color: "#2E5E3E", desc: "中原帝国经略西域，设西域都护府，丝绸之路开通。", detail: "张骞、班超经营，汉文化及冶铁技术西传。" },
            { name: "西域三十六国", start: -140, end: 350, color: "#6A8D73", desc: "楼兰、龟兹、于阗、疏勒等绿洲城邦。", detail: "汉匈之间摇摆，佛教初传，多元文明交汇。" },
            { name: "柔然汗国", start: 402, end: 555, color: "#A569BD", desc: "继匈奴后兴起，多次征讨高昌、焉耆。", detail: "与北魏长期战争，后被突厥击败，残部西迁。" },
            { name: "高昌王国", start: 460, end: 640, color: "#E59866", desc: "吐鲁番盆地汉族移民建立的佛国。", detail: "麴氏高昌最久，唐贞观十四年灭国。" },
            { name: "突厥汗国", start: 552, end: 659, color: "#BD7F6E", desc: "兴起于阿尔泰，征服中亚和西域。", detail: "分裂为东、西突厥，后均被唐军击败。" },
            { name: "唐安西都护府", start: 640, end: 790, color: "#1F618D", desc: "唐朝西域最高管理机构，统安西四镇。", detail: "碎叶、龟兹、疏勒、于阗，阻挡大食东进。" },
            { name: "回鹘汗国", start: 744, end: 840, color: "#D35400", desc: "漠北回鹘助唐平叛，后西迁至高昌、龟兹。", detail: "改信摩尼教，对维吾尔族形成影响深远。" },
            { name: "喀喇汗王朝", start: 840, end: 1212, color: "#D97706", desc: "第一个信仰伊斯兰教的突厥王朝，学术繁荣。", detail: "以巴拉沙衮、喀什噶尔为中心，与高昌回鹘并存。" },
            { name: "高昌回鹘", start: 840, end: 1209, color: "#B45309", desc: "回鹘西迁后建立，以高昌、北庭为中心。", detail: "佛教、摩尼教并存，畏兀儿文化重要阶段。" },
            { name: "西辽", start: 1124, end: 1218, color: "#117A65", desc: "耶律大石率契丹残部建立，称雄中亚。", detail: "汉化制度，宗教宽容，为蒙古西征前最强。" },
            { name: "蒙古/察合台汗国", start: 1225, end: 1346, color: "#7F8C8D", desc: "成吉思汗分封察合台，统治中亚及西域。", detail: "后期分裂为东、西察合台汗国。" },
            { name: "东察合台汗国", start: 1347, end: 1462, color: "#B7950B", desc: "察合台汗国东部政权，天山南北。", detail: "逐渐伊斯兰化，与明朝通好，后演变为吐鲁番汗国。" },
            { name: "西察合台汗国", start: 1346, end: 1370, color: "#C0392B", desc: "河中地区政权，帖木儿帝国前身。", detail: "文化昌盛，帖木儿从中崛起，对西域西部有影响。" },
            { name: "叶尔羌汗国", start: 1514, end: 1680, color: "#7D3C98", desc: "赛义德汗建立，以莎车为都。", detail: "伊斯兰文学《拉失德史》，后被准噶尔吞并。" },
            { name: "准噶尔汗国", start: 1635, end: 1758, color: "#DC7633", desc: "卫拉特蒙古立国，称霸西域。", detail: "与清朝三代战争，乾隆年间平定。设伊犁将军。" },
            { name: "清朝时期", start: 1758, end: 1912, color: "#2C3E50", desc: "平定准噶尔后设立伊犁将军，新疆建省。", detail: "1884年新疆正式建省，加强治理。" },
            { name: "阿古柏政权", start: 1865, end: 1877, color: "#B91C1C", desc: "浩罕军官阿古柏入侵，建立哲德沙尔汗国。", detail: "占领南疆，实行伊斯兰统治，后被左宗棠平定。" },
            { name: "盛世才时期", start: 1933, end: 1944, color: "#0F4C81", desc: "民国新疆军阀盛世才主政。", detail: "亲苏亲共后期转国民党，推动现代教育。" },
            { name: "中华人民共和国", start: 1949, end: 2026, color: "#E67E22", desc: "新疆和平解放，成立自治区。", detail: "经济快速发展，民族团结，一带一路核心区。" }
        ];

        // 辅助排序（确保按start升序） – 已手动排好
        const MIN_YEAR = -210;   // 公元前210年
        const MAX_YEAR = 2026;
        const YEAR_RANGE = MAX_YEAR - MIN_YEAR;

        const canvas = document.getElementById('timelineCanvas');
        const ctx = canvas.getContext('2d');
        let currentIndex = 0;
        let autoInterval = null;

        function yearToX(year) { return ((year - MIN_YEAR) / YEAR_RANGE) * canvas.width; }

        function drawTimeline() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const barHeight = 30;
            const yStart = 60;
            const gap = 8;

            for (let i = 0; i < dynasties.length; i++) {
                const d = dynasties[i];
                const x1 = yearToX(d.start);
                const x2 = yearToX(d.end);
                const y = yStart + i * (barHeight + gap);
                const width = x2 - x1;
                if (width <= 1) continue;

                // 高亮当前
                ctx.shadowBlur = 0;
                ctx.fillStyle = d.color;
                if (i === currentIndex) {
                    ctx.fillStyle = "#F5B042";
                    ctx.shadowColor = "rgba(245,176,66,0.6)";
                    ctx.shadowBlur = 8;
                } else {
                    ctx.globalAlpha = 0.85;
                }
                ctx.fillRect(x1, y, width, barHeight);
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                // 边框
                ctx.strokeStyle = "#4b5563";
                ctx.lineWidth = 1;
                ctx.strokeRect(x1, y, width, barHeight);

                // 政权名称
                ctx.font = "bold 13px 'Noto Sans SC'";
                ctx.fillStyle = i === currentIndex ? "#000000" : "#1e293b";
                const nameWidth = ctx.measureText(d.name).width;
                if (width > nameWidth + 8) {
                    ctx.fillText(d.name, x1 + 4, y + barHeight - 8);
                } else {
                    ctx.font = "11px sans-serif";
                    ctx.fillText(d.name.slice(0,4)+"…", x1 + 2, y + barHeight - 8);
                }

                // 年份小字
                ctx.font = "9px monospace";
                ctx.fillStyle = "#4b5563";
                ctx.fillText(`${d.start>0?d.start:d.start}年`, x1, y-2);
                ctx.fillText(`${d.end}年`, x2-28, y-2);
            }

            // 绘制公元基准线和刻度
            ctx.beginPath();
            ctx.strokeStyle = "#aaa";
            ctx.lineWidth = 0.8;
            for (let year = -200; year <= 2000; year += 200) {
                if(year >= MIN_YEAR && year <= MAX_YEAR) {
                    const x = yearToX(year);
                    ctx.moveTo(x, 20);
                    ctx.lineTo(x, canvas.height-15);
                    ctx.stroke();
                    ctx.fillStyle = "#6b7280";
                    ctx.font = "10px sans-serif";
                    ctx.fillText(year, x-12, 18);
                }
            }
            const x0 = yearToX(0);
            ctx.fillStyle = "#dc2626";
            ctx.fillText("公元元年", x0-12, 40);
        }

        function updateDetailAndBar() {
            const d = dynasties[currentIndex];
            document.getElementById('detailCard').innerHTML = `
                <div class="flex flex-col md:flex-row justify-between gap-4">
                    <div class="flex-1">
                        <h2 class="text-2xl font-bold text-amber-800 flex items-center gap-2">${d.name} <span class="text-sm bg-amber-100 px-2 py-0.5 rounded-full">${d.start>0?d.start:d.start}年 — ${d.end}年</span></h2>
                        <p class="text-gray-700 mt-3 leading-relaxed">📜 ${d.desc}</p>
                        <div class="mt-4 p-4 bg-amber-50 rounded-xl italic text-gray-700 border-l-4 border-amber-500">📖 历史细节：${d.detail}</div>
                    </div>
                    <div class="w-20 h-20 rounded-full flex-shrink-0 self-center" style="background:${d.color}40; border: 3px solid ${d.color}"></div>
                </div>
                <div class="mt-3 text-xs text-gray-500">🔗 逻辑关联：${getRelation(currentIndex)}</div>
            `;
            document.getElementById('stepIndicator').innerHTML = `<span class="bg-amber-100 px-4 py-1.5 rounded-full text-sm">${currentIndex+1} / ${dynasties.length} · 当前：${d.name}</span>`;
            drawTimeline();
        }

        function getRelation(idx) {
            const name = dynasties[idx].name;
            if(name.includes("喀喇汗")) return "继承回鹘汗国政治遗产，与高昌回鹘并存，后被西辽征服。";
            if(name === "阿古柏政权") return "趁清朝内乱入侵南疆，终被左宗棠收复新疆。";
            if(name === "西辽") return "耶律大石击败塞尔柱帝国，后为蒙古所灭。";
            if(name.includes("察合台")) return "蒙古帝国分裂后的重要分支，影响整个中亚。";
            if(name === "准噶尔汗国") return "持续侵扰清朝，最后被乾隆彻底平定，新疆纳入中央版图。";
            if(name === "清朝时期") return "设立伊犁将军，1884年建省，奠定现代新疆治理基础。";
            return "与前后政权存在继承、征服或并存关系，详见时间轴位置。";
        }

        function next() { stopAuto(); currentIndex = (currentIndex + 1) % dynasties.length; updateDetailAndBar(); }
        function prev() { stopAuto(); currentIndex = (currentIndex - 1 + dynasties.length) % dynasties.length; updateDetailAndBar(); }
        function reset() { stopAuto(); currentIndex = 0; updateDetailAndBar(); }
        function startAuto() { stopAuto(); autoInterval = setInterval(() => { currentIndex = (currentIndex + 1) % dynasties.length; updateDetailAndBar(); }, 2000); }
        function stopAuto() { if(autoInterval) { clearInterval(autoInterval); autoInterval = null; } }

        document.getElementById('prevBtn').addEventListener('click', prev);
        document.getElementById('nextBtn').addEventListener('click', next);
        document.getElementById('playBtn').addEventListener('click', startAuto);
        document.getElementById('resetBtn').addEventListener('click', reset);

        function resizeCanvas() {
            const container = canvas.parentElement;
            const w = Math.min(1300, container.clientWidth - 30);
            canvas.width = w;
            canvas.height = 45 + dynasties.length * 38;  // 动态高度
            drawTimeline();
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        updateDetailAndBar();
    </script>
</body>
</html>

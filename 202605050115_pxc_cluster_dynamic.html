<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PXC 与传统 MySQL 集群动态图</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #eef2f7;
    font-family: "Segoe UI", Arial, sans-serif;
  }
  .container {
    max-width: 1400px;
    margin: 40px auto;
    text-align: center;
  }
  h1 {
    font-size: 40px;
    margin-bottom: 30px;
    color: #333;
  }
  .btn-group {
    margin-bottom: 30px;
  }
  .btn {
    padding: 12px 24px;
    margin: 0 10px;
    border-radius: 6px;
    border: 1px solid #4a90e2;
    background: #fff;
    color: #4a90e2;
    cursor: pointer;
    font-size: 16px;
  }
  .btn.active {
    background: #4a90e2;
    color: #fff;
  }
  .panel {
    width: 90%;
    margin: 0 auto;
    padding: 30px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 18px rgba(0,0,0,0.1);
  }
  .diagram {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .node {
    padding: 16px 26px;
    border-radius: 30px;
    font-size: 20px;
    font-weight: bold;
    position: relative;
    animation: pulse 2s infinite;
  }
  .client { background: #d1f2eb; color: #117864; }
  .pxc { background: #fdebd0; color: #d35400; }
  .slave { background: #d6eaf8; color: #1b4f72; }
  .arrow {
    font-size: 30px;
    color: #999;
    animation: flow 1.5s infinite;
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes flow {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
  }
  .hidden { display: none; }

  /* 对比表格 */
  table {
    width: 95%;
    margin: 40px auto;
    border-collapse: collapse;
    font-size: 20px;
  }
  th, td {
    border: 1px solid #ccc;
    padding: 18px;
  }
  th {
    background: #4a90e2;
    color: #fff;
  }
  td {
    background: #fafafa;
  }
</style>
</head>

<body>
<div class="container">
  <h1>PXC 与传统 MySQL 集群动态图</h1>

  <div class="btn-group">
    <button class="btn active" data-target="pxc">PXC 动态流程</button>
    <button class="btn" data-target="classic">传统 MySQL 主从</button>
    <button class="btn" data-target="compare">优劣对比表格</button>
  </div>

  <!-- PXC 动态图 -->
  <div id="pxc" class="panel">
    <div class="diagram">
      <div class="node client">应用</div>
      <div class="arrow">⇄</div>
      <div class="node pxc">PXC 节点 1</div>
      <div class="arrow">⇄</div>
      <div class="node pxc">PXC 节点 2</div>
      <div class="arrow">⇄</div>
      <div class="node pxc">PXC 节点 3</div>
    </div>
    <p style="font-size:22px;margin-top:20px;color:#555;">
      PXC 采用同步复制，所有节点保持强一致性，任意节点可读写。
    </p>
  </div>

  <!-- 传统主从 -->
  <div id="classic" class="panel hidden">
    <div class="diagram">
      <div class="node client">应用</div>
      <div class="arrow">⇄</div>
      <div class="node pxc">主库</div>
    </div>
    <div class="diagram">
      <div class="node slave">从库 1</div>
      <div class="arrow">←</div>
      <div class="node slave">binlog</div>
      <div class="arrow">→</div>
      <div class="node slave">从库 2</div>
    </div>
    <p style="font-size:22px;margin-top:20px;color:#555;">
      主库写入，异步复制到从库，可能存在延迟。
    </p>
  </div>

  <!-- 对比表格 -->
  <div id="compare" class="panel hidden">
    <table>
      <tr>
        <th>对比项</th>
        <th>PXC</th>
        <th>传统 MySQL 主从</th>
      </tr>
      <tr>
        <td>复制方式</td>
        <td>同步复制（强一致）</td>
        <td>异步复制（可能延迟）</td>
      </tr>
      <tr>
        <td>写入能力</td>
        <td>多主写入</td>
        <td>单主写入</td>
      </tr>
      <tr>
        <td>故障切换</td>
        <td>自动，无中断</td>
        <td>需要切换，有故障窗口</td>
      </tr>
      <tr>
        <td>适用场景</td>
        <td>核心业务、高一致性</td>
        <td>读多写少、成本敏感</td>
      </tr>
    </table>
  </div>
</div>

<script>
  const btns = document.querySelectorAll('.btn');
  const panels = document.querySelectorAll('.panel');

  btns.forEach(btn => {
    btn.onclick = () => {
      btns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const target = btn.dataset.target;
      panels.forEach(p => p.classList.add('hidden'));
      document.getElementById(target).classList.remove('hidden');
    };
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>榆林市经济结构与发展现状 · 流程动态图</title>
<style>
  body {
    background: #f5f7fa;
    font-family: "Microsoft YaHei", "苹方", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 20px;
  }
  h1 {
    color: #2c3e50;
    margin-bottom: 5px;
  }
  .subtitle {
    color: #7f8c8d;
    margin-bottom: 20px;
    font-size: 16px;
  }
  canvas {
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    padding: 10px 24px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: #3498db;
    color: white;
    transition: background 0.2s;
    box-shadow: 0 3px 8px rgba(52,152,219,0.3);
  }
  button:hover {
    background: #2980b9;
  }
  button:active {
    transform: scale(0.97);
  }
  button.pause {
    background: #e67e22;
  }
  button.reset {
    background: #95a5a6;
  }
  .legend {
    display: flex;
    gap: 20px;
    margin-top: 15px;
    font-size: 14px;
    color: #2c3e50;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend span::before {
    content: "●";
    margin-right: 6px;
    font-size: 18px;
    vertical-align: middle;
  }
  .legend .res::before { color: #2ecc71; content: "■"; }
  .legend .ind::before { color: #3498db; content: "■"; }
  .legend .serv::before { color: #e67e22; content: "■"; }
</style>
</head>
<body>
<h1>榆林市经济结构与发展现状</h1>
<div class="subtitle">产业链逻辑关系 · 动态流程图</div>
<canvas id="flowCanvas" width="900" height="520"></canvas>
<div class="controls">
  <button id="playBtn">▶ 自动播放</button>
  <button id="pauseBtn" class="pause">⏸️ 暂停</button>
  <button id="nextBtn">⏭ 下一步</button>
  <button id="resetBtn" class="reset">↺ 重置</button>
</div>
<div class="legend">
  <span class="res">资源/农业基础</span>
  <span class="ind">工业/深加工</span>
  <span class="serv">服务/输出</span>
</div>
<script>
(function() {
  const canvas = document.getElementById('flowCanvas');
  const ctx = canvas.getContext('2d');

  // 节点定义
  const nodes = [
    { id: 'coal',    x: 80,  y: 120, label: '煤炭',    type: 'res' },
    { id: 'oil',     x: 80,  y: 220, label: '石油',    type: 'res' },
    { id: 'gas',     x: 80,  y: 320, label: '天然气',  type: 'res' },
    { id: 'wind',    x: 80,  y: 420, label: '风光新能源', type: 'res' },
    { id: 'chem',    x: 320, y: 140, label: '煤化工',  type: 'ind' },
    { id: 'petro',   x: 320, y: 250, label: '石油化工', type: 'ind' },
    { id: 'newmat',  x: 320, y: 370, label: '新材料',  type: 'ind' },
    { id: 'agri',    x: 560, y: 80,  label: '特色农业', type: 'res' },
    { id: 'process', x: 560, y: 200, label: '农产品加工', type: 'ind' },
    { id: 'tour',    x: 560, y: 330, label: '文旅资源', type: 'res' },
    { id: 'serv',    x: 800, y: 180, label: '物流商贸', type: 'serv' },
    { id: 'market',  x: 800, y: 320, label: '终端市场', type: 'serv' }
  ];

  // 边定义 (起点id, 终点id)
  const edges = [
    { from: 'coal',   to: 'chem' },
    { from: 'oil',    to: 'petro' },
    { from: 'gas',    to: 'petro' },
    { from: 'gas',    to: 'chem' },
    { from: 'wind',   to: 'newmat' },
    { from: 'coal',   to: 'newmat' },
    { from: 'chem',   to: 'newmat' },
    { from: 'petro',  to: 'newmat' },
    { from: 'agri',   to: 'process' },
    { from: 'process',to: 'market' },
    { from: 'newmat', to: 'market' },
    { from: 'chem',   to: 'serv' },
    { from: 'petro',  to: 'serv' },
    { from: 'tour',   to: 'serv' },
    { from: 'serv',   to: 'market' },
    { from: 'chem',   to: 'market' }
  ];

  // 状态
  let shownEdges = new Array(edges.length).fill(false); // 是否已显示
  let autoInterval = null;
  let playing = false;

  function getNodeById(id) {
    return nodes.find(n => n.id === id);
  }

  function drawNode(node, highlight = false) {
    const colorMap = { res: '#2ecc71', ind: '#3498db', serv: '#e67e22' };
    const fill = colorMap[node.type] || '#95a5a6';
    ctx.save();
    ctx.shadowColor = highlight ? 'rgba(0,0,0,0.25)' : 'rgba(0,0,0,0.05)';
    ctx.shadowBlur = highlight ? 8 : 4;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.roundRect(node.x - 55, node.y - 18, 110, 36, 18);
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'white';
    ctx.font = 'bold 14px "Microsoft YaHei","苹方",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.label, node.x, node.y);
  }

  // 圆角矩形辅助
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    if (w < 2 * r) r = w / 2;
    if (h < 2 * r) r = h / 2;
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };

  function drawArrow(from, to, progress = 1) {
    const f = getNodeById(from);
    const t = getNodeById(to);
    if (!f || !t) return;
    const dx = t.x - f.x;
    const dy = t.y - f.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const startX = f.x + (dx/dist)*55;
    const startY = f.y + (dy/dist)*18;
    const endX = t.x - (dx/dist)*55;
    const endY = t.y - (dy/dist)*18;
    const curX = startX + (endX - startX) * progress;
    const curY = startY + (endY - startY) * progress;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(curX, curY);
    ctx.strokeStyle = '#bdc3c7';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    // 箭头 (仅在完全绘制时画)
    if (progress >= 1) {
      const angle = Math.atan2(endY - startY, endX - startX);
      const arrowSize = 10;
      const arrowX = endX - Math.cos(angle) * 8;
      const arrowY = endY - Math.sin(angle) * 8;
      ctx.fillStyle = '#bdc3c7';
      ctx.beginPath();
      ctx.moveTo(arrowX, arrowY);
      ctx.lineTo(
        arrowX - arrowSize * Math.cos(angle - Math.PI/6),
        arrowY - arrowSize * Math.sin(angle - Math.PI/6)
      );
      ctx.lineTo(
        arrowX - arrowSize * Math.cos(angle + Math.PI/6),
        arrowY - arrowSize * Math.sin(angle + Math.PI/6)
      );
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawAll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 画所有已显示的边
    for (let i = 0; i < edges.length; i++) {
      if (shownEdges[i]) {
        drawArrow(edges[i].from, edges[i].to, 1);
      }
    }
    // 如果有正在动画的边
    if (animatingEdge !== null && animatingEdge.progress < 1) {
      const e = edges[animatingEdge.index];
      drawArrow(e.from, e.to, animatingEdge.progress);
    }
    // 画所有节点
    nodes.forEach(n => drawNode(n, false));
    // 高亮正在动画的边的两个节点
    if (animatingEdge !== null) {
      const e = edges[animatingEdge.index];
      const fn = getNodeById(e.from);
      const tn = getNodeById(e.to);
      if (fn) drawNode(fn, true);
      if (tn) drawNode(tn, true);
    }
  }

  let animatingEdge = null; // { index, progress }
  let animationFrameId = null;

  function startEdgeAnimation(index) {
    if (index < 0 || index >= edges.length) return;
    animatingEdge = { index, progress: 0 };
    function step() {
      if (!animatingEdge || animatingEdge.index !== index) return;
      animatingEdge.progress += 0.03;
      if (animatingEdge.progress >= 1) {
        animatingEdge.progress = 1;
        shownEdges[index] = true;
        animatingEdge = null;
        drawAll();
        // 如果自动播放，触发下一个
        if (playing) {
          const next = index + 1;
          if (next < edges.length) {
            startEdgeAnimation(next);
          } else {
            pauseAuto();
          }
        }
        return;
      }
      drawAll();
      animationFrameId = requestAnimationFrame(step);
    }
    animationFrameId = requestAnimationFrame(step);
  }

  function showNextEdge() {
    if (animatingEdge) return; // 正在动画中
    const nextIndex = shownEdges.indexOf(false);
    if (nextIndex === -1) {
      alert('所有流程已展示完毕。');
      pauseAuto();
      return;
    }
    startEdgeAnimation(nextIndex);
  }

  function resetAll() {
    pauseAuto();
    if (animationFrameId) cancelAnimationFrame(animationFrameId);
    animatingEdge = null;
    shownEdges.fill(false);
    drawAll();
  }

  function startAuto() {
    if (playing) return;
    playing = true;
    document.getElementById('playBtn').disabled = true;
    showNextEdge(); // 立即开始下一条
  }

  function pauseAuto() {
    playing = false;
    document.getElementById('playBtn').disabled = false;
    // 不清除当前动画，让它完成
  }

  // 按钮绑定
  document.getElementById('playBtn').addEventListener('click', startAuto);
  document.getElementById('pauseBtn').addEventListener('click', pauseAuto);
  document.getElementById('nextBtn').addEventListener('click', () => {
    pauseAuto(); // 手动控制时停止自动
    showNextEdge();
  });
  document.getElementById('resetBtn').addEventListener('click', resetAll);

  // 初始绘制
  drawAll();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K8s RBAC 权限模型 · 动态流程图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f0f4fa;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 10px 60px;
}
h1{font-size:20px;font-weight:700;color:#18243e;margin-bottom:4px;text-align:center;letter-spacing:.5px}
.sub{font-size:12px;color:#8898b8;margin-bottom:14px;text-align:center;line-height:1.7}

/* controls */
.ctrl{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;align-items:center}
.btn{padding:6px 15px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;transition:all .16s;letter-spacing:.2px}
.bp{background:#2f54d0;color:#fff}.bp:hover{background:#1e3caa}
.bs{background:#fff;color:#38485e;border:1.2px solid #c8d4e8}.bs:hover{background:#e6eef8;border-color:#2f54d0}
.br{background:#e8edf6;color:#58687e;border:1.2px solid #c8d4e8}.br:hover{background:#d8e0ee}
.slbl{font-size:11.5px;color:#8898b8}
.tabs{display:flex;gap:5px}
.tab{padding:5px 11px;border-radius:6px;border:1.2px solid #c8d4e8;background:#fff;font-size:11.5px;cursor:pointer;color:#38485e;transition:all .14s}
.tab.on{background:#2f54d0;color:#fff;border-color:#2f54d0}

/* legend */
.lgd{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;font-size:11.5px;color:#58687e}
.li{display:flex;align-items:center;gap:4px}
.lb{width:13px;height:13px;border-radius:3px;flex-shrink:0}

/* canvas */
.wrap{background:#fff;border-radius:16px;box-shadow:0 3px 22px rgba(0,0,0,.09);
  padding:20px 14px 18px;width:100%;max-width:980px;overflow-x:auto}

/* node anim */
.ng{opacity:0;transition:opacity .42s,transform .42s;transform:translateY(7px)}
.ng.v{opacity:1;transform:translateY(0)}
.cg{opacity:0;transition:opacity .32s}.cg.v{opacity:1}

/* dots */
.dots{display:flex;gap:6px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:#dce4f0;cursor:pointer;transition:background .22s}
.dot.on{background:#2f54d0}

/* info */
.info{margin-top:11px;font-size:12.5px;color:#4a5a70;text-align:center;
  min-height:38px;line-height:1.75;max-width:940px;padding:0 8px}

@keyframes flowDash{to{stroke-dashoffset:-16}}
.fdash{stroke-dasharray:5 4;animation:flowDash 1s linear infinite}
@keyframes pulseR{0%,100%{opacity:.7}50%{opacity:1}}
.pulse{animation:pulseR 1.4s ease-in-out infinite}
</style>
</head>
<body>

<h1>Kubernetes RBAC 权限模型</h1>
<p class="sub">
  User / ServiceAccount &nbsp;→&nbsp; Role / ClusterRole &nbsp;→&nbsp; RoleBinding / ClusterRoleBinding &nbsp;→&nbsp; 资源访问<br>
  选择场景后播放，或逐步浏览每个鉴权节点
</p>

<div class="ctrl">
  <button class="btn bp" id="btnPlay" onclick="togglePlay()">▶ 播放</button>
  <button class="btn bs" onclick="stepFwd()">→ 下一步</button>
  <button class="btn bs" onclick="stepBk()">← 上一步</button>
  <button class="btn br" onclick="doReset()">↺ 重置</button>
  <span class="slbl">速度</span>
  <button class="btn bs" onclick="spd=1500">慢</button>
  <button class="btn bs" onclick="spd=850">中</button>
  <button class="btn bs" onclick="spd=380">快</button>
  <div class="tabs">
    <span class="slbl">场景&nbsp;</span>
    <button class="tab on" id="t0" onclick="setScene(0)">开发者只读</button>
    <button class="tab"    id="t1" onclick="setScene(1)">CI/CD 集群部署</button>
    <button class="tab"    id="t2" onclick="setScene(2)">越权被拒</button>
  </div>
</div>

<div class="lgd">
  <div class="li"><div class="lb" style="background:#dbeafe;border:1.2px solid #3b82f6"></div>主体 Subject</div>
  <div class="li"><div class="lb" style="background:#fef3c7;border:1.2px solid #d97706"></div>角色 Role</div>
  <div class="li"><div class="lb" style="background:#ede9fe;border:1.2px solid #7c3aed"></div>绑定 Binding</div>
  <div class="li"><div class="lb" style="background:#dcfce7;border:1.2px solid #16a34a"></div>资源 Resource</div>
  <div class="li"><div class="lb" style="background:#fee2e2;border:1.2px solid #dc2626"></div>拒绝 Deny</div>
  <div class="li"><div class="lb" style="background:#f0fdf4;border:1.2px dashed #16a34a"></div>命名空间范围</div>
</div>

<script>
/* ── 场景数据 ── */
const SC = [
  { /* 0: 开发者只读 */
    user:'dev-user (User · X.509)',   sa:'— (不涉及)',
    binding:'RoleBinding: dev-readonly-binding  (namespace: default)',
    role:'pod-reader (Role)',          cr:'— (不使用 ClusterRole)',
    verbs:'get · list · watch',       res:'pods · services · configmaps',
    verdict:'请求资源: pods · 动词: get → 命中 pod-reader rules → 放行',
    result:'allow',
    tips:[
      '【kube-apiserver】dev-user 执行 kubectl get pods -n default，请求进入 API Server',
      '【主体识别】解析 kubeconfig 中 X.509 证书，主体确认为 User: dev-user',
      '【查找 Binding】在 default namespace 找到 RoleBinding: dev-readonly-binding，subjects 包含 dev-user',
      '【引用 Role】RoleBinding.roleRef → Role: pod-reader (namespace: default)',
      '【解析 Rules】rules: [{apiGroups:[""], resources:["pods","services","configmaps"], verbs:["get","list","watch"]}]',
      '【鉴权引擎】请求动词 get + 资源 pods → 命中 rules，RBAC 鉴权通过',
      '【访问结果】✅ 请求放行，返回 default namespace Pod 列表 | ❌ 路径不适用',
      '【资源操作】Pod 列表数据返回 kubectl，dev-user 可查看但无法修改',
      '【审计闭环】操作写入 audit log，违规访问可触发告警'
    ]
  },
  { /* 1: CI/CD 集群部署 */
    user:'— (不涉及)',   sa:'ci-sa (ServiceAccount · namespace: ci-system)',
    binding:'ClusterRoleBinding: ci-cluster-deployer (全局生效)',
    role:'— (不使用 Role)',  cr:'deployer (ClusterRole)',
    verbs:'get · list · create · update · patch · delete',
    res:'deployments · services · configmaps · secrets',
    verdict:'请求资源: deployments · 动词: patch → 命中 ClusterRole deployer → 跨 ns 放行',
    result:'allow',
    tips:[
      '【kube-apiserver】Pod 内 CI 程序使用挂载的 ServiceAccount Token 发起 PATCH /apis/apps/v1/namespaces/prod/deployments/web',
      '【主体识别】Token 解析为 ServiceAccount: ci-sa，namespace: ci-system',
      '【查找 Binding】找到 ClusterRoleBinding: ci-cluster-deployer，subjects 含 ci-sa，集群全局生效',
      '【引用 ClusterRole】ClusterRoleBinding.roleRef → ClusterRole: deployer（不受 namespace 限制）',
      '【解析 Rules】rules 允许对 deployments/services/configmaps/secrets 执行 get/list/create/update/patch/delete',
      '【鉴权引擎】动词 patch + 资源 deployments → 命中 ClusterRole rules，跨 namespace 鉴权通过',
      '【访问结果】✅ 允许，CI 程序成功更新 prod namespace Deployment | ❌ 路径不适用',
      '【资源操作】Deployment 滚动升级触发，新版本 Pod 逐步替换',
      '【审计闭环】集群级操作全量写入 audit log，可追溯责任人'
    ]
  },
  { /* 2: 越权被拒 */
    user:'intern-user (User)',   sa:'— (不涉及)',
    binding:'RoleBinding: intern-binding → Role: pod-reader (仅 pods 只读)',
    role:'pod-reader (Role · 仅 pods get/list)',  cr:'— (无 ClusterRole)',
    verbs:'get · list（仅限 pods）',  res:'secrets（⛔ 未授权）',
    verdict:'请求资源: secrets · 动词: get → 未命中任何 rules → 默认拒绝',
    result:'deny',
    tips:[
      '【kube-apiserver】intern-user 尝试 kubectl get secrets -n default，请求进入 API Server',
      '【主体识别】证书解析为 User: intern-user',
      '【查找 Binding】找到 RoleBinding: intern-binding，subjects 含 intern-user，roleRef → Role: pod-reader',
      '【引用 Role】Role: pod-reader rules 仅含 resources:["pods"]，无 secrets 条目',
      '【解析 Rules】rules: [{resources:["pods"], verbs:["get","list"]}]，secrets 不在列表内',
      '【鉴权引擎】请求资源 secrets 未命中任何 rules → RBAC Deny-by-default 触发',
      '【访问结果】❌ 403 Forbidden，secrets 数据不返回 | ✅ 允许路径不适用',
      '【资源操作】Secrets 访问被阻断，敏感数据安全，intern-user 收到 403 错误',
      '【审计闭环】拒绝事件写入 audit log，可配置告警通知安全团队'
    ]
  }
];

const SIDS = ['s0','s1','s2','s3','s4','s5','s6','s7','s8'];
const CIDS = [null,'c01','c12','c23','c34','c45','c56','c67',null];

let cur=-1, playing=false, timer=null, spd=900, scene=0;

const dotsEl=document.getElementById('dots');
const infoEl=document.getElementById('info');
const btnPlay=document.getElementById('btnPlay');

SIDS.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot';d.onclick=()=>jumpTo(i);dotsEl.appendChild(d);
});
function updDots(){dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));}

function applySceneData(sc){
  const s=SC[sc];
  document.getElementById('s1-user').textContent = s.user;
  document.getElementById('s1-sa').textContent   = s.sa;
  document.getElementById('s2-name').textContent = s.binding;
  document.getElementById('s3-role').textContent = s.role;
  document.getElementById('s3-cr').textContent   = s.cr;
  document.getElementById('s4-verbs').textContent= s.verbs;
  document.getElementById('s4-res').textContent  = s.res;
  document.getElementById('s5-verdict').textContent = s.verdict;
  // highlight allow/deny
  const ra=document.getElementById('r-allow');
  const rd=document.getElementById('r-deny');
  if(s.result==='allow'){
    ra.setAttribute('fill','#86efac');ra.setAttribute('stroke','#15803d');ra.setAttribute('stroke-width','2');
    rd.setAttribute('fill','#fee2e2');rd.setAttribute('stroke','#dc2626');rd.setAttribute('stroke-width','1.3');
  } else {
    rd.setAttribute('fill','#fca5a5');rd.setAttribute('stroke','#b91c1c');rd.setAttribute('stroke-width','2');
    ra.setAttribute('fill','#dcfce7');ra.setAttribute('stroke','#16a34a');ra.setAttribute('stroke-width','1.3');
  }
  // flow line
  document.getElementById('fl-ok').setAttribute('opacity', s.result==='allow'?'1':'0');
}

function showStep(idx){
  if(idx<0||idx>=SIDS.length)return;
  document.getElementById(SIDS[idx]).classList.add('v');
  if(CIDS[idx]){const el=document.getElementById(CIDS[idx]);if(el)el.classList.add('v');}
  if(idx>=2) applySceneData(scene);
  infoEl.textContent = SC[scene].tips[idx];
  cur=idx; updDots();
}

function jumpTo(idx){
  if(idx<=cur)return;
  for(let i=cur+1;i<=idx;i++) showStep(i);
}
function stepFwd(){stopPlay(); if(cur<SIDS.length-1) showStep(cur+1);}
function stepBk(){
  stopPlay();
  if(cur<=0){doReset();return;}
  const t=cur-1; doReset(true);
  for(let i=0;i<=t;i++) showStep(i);
}
function doReset(silent){
  stopPlay();
  document.querySelectorAll('.ng,.cg').forEach(el=>el.classList.remove('v'));
  document.getElementById('fl-ok').setAttribute('opacity','0');
  ['s1-user','s1-sa','s2-name','s3-role','s3-cr','s4-verbs','s4-res','s5-verdict'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent='—';
  });
  const ra=document.getElementById('r-allow'),rd=document.getElementById('r-deny');
  ra.setAttribute('fill','#dcfce7');ra.setAttribute('stroke','#16a34a');ra.setAttribute('stroke-width','1.3');
  rd.setAttribute('fill','#fee2e2');rd.setAttribute('stroke','#dc2626');rd.setAttribute('stroke-width','1.3');
  cur=-1; updDots();
  if(!silent) infoEl.textContent='选择场景后点击「播放」，或点击「下一步」逐节点浏览';
}
function togglePlay(){if(playing)stopPlay();else startPlay();}
function startPlay(){
  playing=true; btnPlay.textContent='⏸ 暂停';
  function nx(){
    if(cur>=SIDS.length-1){stopPlay();return;}
    showStep(cur+1); timer=setTimeout(nx,spd);
  }
  timer=setTimeout(nx, cur===-1?200:spd);
}
function stopPlay(){playing=false;clearTimeout(timer);btnPlay.textContent='▶ 播放';}
function setScene(n){
  scene=n;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===n));
  doReset(false);
}
</script>
</body>
</html>

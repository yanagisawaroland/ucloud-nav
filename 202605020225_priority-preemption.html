<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K8s PriorityClass 抢占调度流程图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f0f2f5;
  font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 30px;
}
.container {
  max-width: 960px;
  width: 100%;
  background: #ffffff;
  border-radius: 18px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.07);
  padding: 35px 30px 30px;
}
h1 {
  text-align: center;
  color: #1a1a2e;
  font-size: 26px;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.subtitle {
  text-align: center;
  color: #888;
  font-size: 14px;
  margin-bottom: 28px;
  font-weight: 400;
}
.flowchart-wrap {
  position: relative;
  width: 100%;
  max-width: 920px;
  height: 680px;
  margin: 0 auto;
  overflow: hidden;
}
.node {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: #8895aa;
  background: #f5f7fa;
  border: 2px solid #d0d7e2;
  border-radius: 10px;
  padding: 0 14px;
  white-space: nowrap;
  z-index: 2;
  user-select: none;
  transition: all 0.55s ease;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.node.completed {
  color: #1e5b4a;
  background: #d1fae5;
  border-color: #34d399;
  box-shadow: 0 2px 12px rgba(5,150,105,0.15);
}
.node.active {
  color: #1e3a8a;
  background: #ffffff;
  border-color: #2563eb;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.15), 0 4px 20px rgba(37,99,235,0.2);
  transform: scale(1.06);
  animation: pulse-glow 1.2s ease-in-out infinite alternate;
}
.node.alt-active {
  color: #7c2d12;
  background: #fff7ed;
  border-color: #f97316;
  box-shadow: 0 0 0 4px rgba(249,115,22,0.15), 0 4px 20px rgba(249,115,22,0.2);
  transform: scale(1.06);
  animation: pulse-orange 1.2s ease-in-out infinite alternate;
}
.node.success-active {
  color: #065f46;
  background: #ecfdf5;
  border-color: #10b981;
  box-shadow: 0 0 0 4px rgba(16,185,129,0.15), 0 4px 20px rgba(16,185,129,0.2);
  transform: scale(1.06);
  animation: pulse-green 1.2s ease-in-out infinite alternate;
}
.node.dim-active {
  color: #6b7280;
  background: #f9fafb;
  border-color: #9ca3af;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  opacity: 1;
}
@keyframes pulse-glow {
  0% { box-shadow: 0 0 0 4px rgba(37,99,235,0.15), 0 4px 20px rgba(37,99,235,0.2); }
  100% { box-shadow: 0 0 0 8px rgba(37,99,235,0.08), 0 4px 30px rgba(37,99,235,0.3); }
}
@keyframes pulse-orange {
  0% { box-shadow: 0 0 0 4px rgba(249,115,22,0.15), 0 4px 20px rgba(249,115,22,0.2); }
  100% { box-shadow: 0 0 0 8px rgba(249,115,22,0.08), 0 4px 30px rgba(249,115,22,0.3); }
}
@keyframes pulse-green {
  0% { box-shadow: 0 0 0 4px rgba(16,185,129,0.15), 0 4px 20px rgba(16,185,129,0.2); }
  100% { box-shadow: 0 0 0 8px rgba(16,185,129,0.08), 0 4px 30px rgba(16,185,129,0.3); }
}
.node.decision {
  width: 90px;
  height: 90px;
  padding: 0;
  border-radius: 6px;
  transform: rotate(45deg);
}
.node.decision .inner {
  transform: rotate(-45deg);
  text-align: center;
  line-height: 1.3;
  font-size: 13px;
}
.node.decision.completed { background: #fef3c7; border-color: #f59e0b; color: #92400e; }
.node.decision.alt-active { background: #fffbeb; border-color: #f59e0b; }
.branch-label {
  position: absolute;
  z-index: 3;
  font-size: 14px;
  font-weight: 700;
  padding: 2px 12px;
  border-radius: 12px;
  opacity: 0.4;
  transition: opacity 0.5s;
}
.branch-label.active { opacity: 1; }
.branch-label.yes { color: #059669; background: #d1fae5; }
.branch-label.no { color: #dc2626; background: #fee2e2; }
.svg-conn {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}
.arrow-line {
  stroke: #d0d7e2;
  stroke-width: 2.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: stroke 0.5s, stroke-width 0.4s;
}
.arrow-line.completed { stroke: #34d399; stroke-width: 3; }
.arrow-line.active { stroke: #2563eb; stroke-width: 3.5; }
.arrow-line.alt-active { stroke: #f97316; stroke-width: 3.5; }
.arrow-line.success-active { stroke: #10b981; stroke-width: 3.5; }
.arrow-head { fill: #d0d7e2; transition: fill 0.5s; }
.arrow-head.completed { fill: #34d399; }
.arrow-head.active { fill: #2563eb; }
.arrow-head.alt-active { fill: #f97316; }
.arrow-head.success-active { fill: #10b981; }
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.controls button {
  padding: 9px 18px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: #f0f4f8;
  color: #444;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.controls button:hover { background: #e2e8f0; transform: translateY(-1px); }
.controls button:active { transform: scale(0.95); }
.controls button.primary { background: #2563eb; color: #fff; }
.controls button.primary:hover { background: #1d4ed8; }
.controls button.success { background: #059669; color: #fff; }
.controls button.success:hover { background: #047857; }
.controls button.warning { background: #d97706; color: #fff; }
.controls button.warning:hover { background: #b45309; }
.controls button.danger { background: #ef4444; color: #fff; }
.controls button.danger:hover { background: #dc2626; }
.controls .speed-group {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: 8px;
}
.controls .speed-group label { font-size: 13px; color: #888; }
.controls input[type="range"] {
  width: 90px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: #d0d7e2;
  border-radius: 2px;
  outline: none;
}
.controls input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #2563eb;
  cursor: pointer;
}
.controls input[type="range"]::-moz-range-thumb {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: #2563eb;
  cursor: pointer;
  border: none;
}
.step-info {
  text-align: center;
  margin: 16px 0 6px;
  font-size: 15px;
  color: #555;
  min-height: 26px;
  line-height: 1.6;
}
.step-info .counter {
  display: inline-block;
  background: #f0f4f8;
  padding: 2px 12px;
  border-radius: 12px;
  font-size: 13px;
  color: #666;
  margin-right: 10px;
}
.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 14px 0 0;
  font-size: 12px;
  color: #888;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 14px; height: 14px;
  border-radius: 4px;
  border: 2px solid;
}
.legend-dot.default { border-color: #d0d7e2; background: #f5f7fa; }
.legend-dot.completed { border-color: #34d399; background: #d1fae5; }
.legend-dot.active { border-color: #2563eb; background: #fff; }
.legend-dot.preempt { border-color: #f97316; background: #fff7ed; }
@media (max-width: 700px) {
  .flowchart-wrap { height: 540px; }
  .node { font-size: 11px; }
  .container { padding: 16px; }
  h1 { font-size: 20px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Kubernetes PriorityClass 抢占调度 (Preemption)</h1>
  <p class="subtitle">优先级抢占调度的完整逻辑流程</p>
  <div class="flowchart-wrap" id="flowchart">
    <div class="node" id="n1" style="left:75px;top:25px;width:110px;height:46px;">提交 Pod</div>
    <div class="node" id="n2" style="left:285px;top:25px;width:110px;height:46px;">调度队列</div>
    <div class="node" id="n3" style="left:495px;top:25px;width:130px;height:46px;">节点资源检查</div>
    <div class="node decision" id="n4" style="left:525px;top:160px;"><span class="inner">资源是否充足?</span></div>
    <div class="node" id="n5" style="left:730px;top:175px;width:100px;height:46px;">调度成功</div>
    <div class="node" id="n6" style="left:525px;top:290px;width:110px;height:46px;">触发抢占</div>
    <div class="node" id="n7" style="left:505px;top:400px;width:150px;height:46px;">排序运行中 Pod 优先级</div>
    <div class="node" id="n8" style="left:505px;top:510px;width:150px;height:46px;">驱逐低优先级 Pod</div>
    <div class="node" id="n9" style="left:505px;top:615px;width:150px;height:46px;">抢占调度成功</div>
    <div class="branch-label yes" id="labelYes" style="left:660px;top:170px;">是</div>
    <div class="branch-label no" id="labelNo" style="left:598px;top:253px;">否</div>
    <svg class="svg-conn" viewBox="0 0 920 700" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 Z"/></marker>
        <marker id="arr-c" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 Z"/></marker>
        <marker id="arr-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 Z"/></marker>
        <marker id="arr-o" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 Z"/></marker>
        <marker id="arr-g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,1 L9,5 L0,9 Z"/></marker>
      </defs>
      <path class="arrow-line" id="e1" d="M185,48 L285,48" marker-end="url(#arr)" />
      <path class="arrow-line" id="e2" d="M395,48 L495,48" marker-end="url(#arr)" />
      <path class="arrow-line" id="e3" d="M560,71 L570,115 L570,160" marker-end="url(#arr)" />
      <path class="arrow-line" id="e4" d="M615,205 L730,198" marker-end="url(#arr)" />
      <path class="arrow-line" id="e5" d="M570,250 L570,290" marker-end="url(#arr)" />
      <path class="arrow-line" id="e6" d="M580,336 L580,400" marker-end="url(#arr)" />
      <path class="arrow-line" id="e7" d="M580,446 L580,510" marker-end="url(#arr)" />
      <path class="arrow-line" id="e8" d="M580,556 L580,615" marker-end="url(#arr)" />
    </svg>
  </div>
  <div class="controls">
    <button class="warning" id="btnReset" title="重置">⟲ 重置</button>
    <button id="btnPrev" title="上一步">◀ 上一步</button>
    <button class="primary" id="btnPlay" title="播放/暂停">▶ 播放</button>
    <button id="btnNext" title="下一步">下一步 ▶</button>
    <button class="success" id="btnAuto" title="自动演示">↻ 自动</button>
    <div class="speed-group">
      <label>速度</label>
      <input type="range" id="speedRange" min="1" max="5" value="3" step="1">
      <span id="speedLabel" style="font-size:13px;color:#888;min-width:32px;">3x</span>
    </div>
  </div>
  <div class="step-info" id="stepInfo">
    <span class="counter" id="stepCounter">0 / 8</span>
    <span id="stepText">点击 ▶ 播放 查看完整的 PriorityClass 抢占调度流程</span>
  </div>
  <div class="legend">
    <span class="legend-item"><span class="legend-dot default"></span> 未开始</span>
    <span class="legend-item"><span class="legend-dot completed"></span> 已完成</span>
    <span class="legend-item"><span class="legend-dot active"></span> 当前步骤</span>
    <span class="legend-item"><span class="legend-dot preempt"></span> 抢占路径</span>
  </div>
</div>
<script>
(function(){'use strict'
const N=['n1','n2','n3','n4','n5','n6','n7','n8','n9'],E=['e1','e2','e3','e4','e5','e6','e7','e8']
const ne={},ee={}
N.forEach(i=>{ne[i]=document.getElementById(i)})
E.forEach(i=>{ee[i]=document.getElementById(i)})
const steps=[
{active:[],activeEdge:null,alt:false,completed:[],completedEdges:[],text:'点击 ▶ 播放 查看完整的 PriorityClass 抢占调度流程'},
{active:['n1'],activeEdge:null,alt:false,completed:[],completedEdges:[],text:'用户提交带有 PriorityClass 的 Pod，指定优先级等级'},
{active:['n2'],activeEdge:'e1',alt:false,completed:['n1'],completedEdges:[],text:'Pod 进入调度队列 (Scheduling Queue)，等待调度器处理'},
{active:['n3'],activeEdge:'e2',alt:false,completed:['n1','n2'],completedEdges:['e1'],text:'调度器 (kube-scheduler) 检查集群节点是否有足够资源'},
{active:['n4'],activeEdge:'e3',alt:false,completed:['n1','n2','n3'],completedEdges:['e1','e2'],text:'判断当前集群是否满足 Pod 资源需求'},
{active:['n6'],activeEdge:'e5',alt:true,completed:['n1','n2','n3','n4'],completedEdges:['e1','e2','e3'],text:'资源不足！调度器触发抢占调度 (Preemption)，标记 "否" 路径'},
{active:['n7'],activeEdge:'e6',alt:true,completed:['n1','n2','n3','n4','n6'],completedEdges:['e1','e2','e3','e5'],text:'将运行中的 Pod 按优先级从低到高排序，选择可牺牲的 Pod'},
{active:['n8'],activeEdge:'e7',alt:true,completed:['n1','n2','n3','n4','n6','n7'],completedEdges:['e1','e2','e3','e5','e6'],text:'驱逐 (Evict) 低优先级 Pod，释放节点资源'},
{active:['n9'],activeEdge:'e8',alt:false,success:true,completed:['n1','n2','n3','n4','n6','n7','n8'],completedEdges:['e1','e2','e3','e5','e6','e7'],text:'抢占成功！高优先级 Pod 完成调度并运行 ✅'}
]
const T=steps.length-1
let cur=0,play=false,auto=false,timer=null
function apply(i){
const s=steps[i];if(!s)return
N.forEach(id=>{
const e=ne[id];e.classList.remove('active','completed','alt-active','success-active','dim-active')
if(s.completed&&s.completed.includes(id))e.classList.add('completed')
else if(s.active&&s.active.includes(id)){
if(s.success&&id==='n9')e.classList.add('success-active')
else if(s.alt)e.classList.add('alt-active')
else e.classList.add('active')
}else if(id==='n5')e.classList.add('dim-active')
})
E.forEach(id=>{
const e=ee[id];e.classList.remove('active','completed','alt-active','success-active')
if(s.completedEdges&&s.completedEdges.includes(id))e.classList.add('completed')
else if(s.activeEdge===id){
if(s.success)e.classList.add('success-active')
else if(s.alt)e.classList.add('alt-active')
else e.classList.add('active')
}
})
const y=document.getElementById('labelYes'),n=document.getElementById('labelNo')
i>=4?n.classList.add('active'):n.classList.remove('active')
i===4?y.classList.add('active'):y.classList.remove('active')
document.getElementById('stepCounter').textContent=i+' / '+T
document.getElementById('stepText').textContent=s.text
}
function go(i){if(i<0||i>T)return;cur=i;apply(i)}
function next(){if(cur<T)go(cur+1);else if(auto)go(0);else stop()}
function prev(){if(cur>0)go(cur-1)}
function reset(){stop();auto=false;document.getElementById('btnAuto').textContent='↻ 自动';go(0)}
function start(){if(timer)clearInterval(timer);play=true
const d=Math.max(400,2400-(parseInt(document.getElementById('speedRange').value)-1)*400)
timer=setInterval(next,d)
document.getElementById('btnPlay').textContent='⏸ 暂停';document.getElementById('btnPlay').className='danger'}
function stop(){if(timer){clearInterval(timer);timer=null}
play=false;document.getElementById('btnPlay').textContent='▶ 播放';document.getElementById('btnPlay').className='primary'}
function toggle(){if(play)stop();else{if(cur>=T)go(0);start()}}
function toggleAuto(){auto=!auto
document.getElementById('btnAuto').textContent=auto?'↻ 自动(开)':'↻ 自动'
if(auto&&!play){if(cur>=T)go(0);start()}}
document.getElementById('speedRange').addEventListener('input',function(){
document.getElementById('speedLabel').textContent=this.value+'x'
if(play){stop();start()}})
document.addEventListener('keydown',function(e){
if(e.key===' '||e.key==='Space'){e.preventDefault();toggle()}
else if(e.key==='ArrowRight'){stop();next()}
else if(e.key==='ArrowLeft'){stop();prev()}
else if(e.key==='r'||e.key==='R')reset()})
document.getElementById('btnPlay').addEventListener('click',toggle)
document.getElementById('btnNext').addEventListener('click',function(){stop();next()})
document.getElementById('btnPrev').addEventListener('click',function(){stop();prev()})
document.getElementById('btnReset').addEventListener('click',reset)
document.getElementById('btnAuto').addEventListener('click',toggleAuto)
go(0)})()
</script>
</body>
</html>

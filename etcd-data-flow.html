<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>etcd 数据流转 动态示意图</title>
<style>
body {
  background-color: #f9fafb;
  font-family: system-ui;
  color: #333;
  padding: 20px;
}
h2 {
  text-align: center;
  margin-bottom: 25px;
  font-weight: 500;
}
.container {
  max-width: 1050px;
  margin: 0 auto;
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e4e7ed;
  padding: 24px;
}
.flow-box {
  position: relative;
  height: 360px;
}
.node {
  position: absolute;
  padding: 9px 14px;
  border-radius: 8px;
  font-size: 14px;
  border: 2px solid;
  background: #fff;
}
/* 节点配色 */
.n1 { border-color: #409eff; }
.n2 { border-color: #9c88ff; }
.n3 { border-color: #17c3b2; }
.n4 { border-color: #ff9f43; }
.n5 { border-color: #6c757d; }

.line {
  position: absolute;
  background: #dcdfe6;
}
.arrow {
  position: absolute;
  border-style: solid;
}
/* 激活高亮 */
.on {
  background-color: #409eff;
  transition: 0.35s;
}
.btn-group {
  text-align: center;
  margin: 20px 0;
}
button {
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  margin: 0 8px;
  font-size: 14px;
}
.btn-blue {
  background: #409eff;
  color: #fff;
}
.btn-gray {
  background: #e5e6eb;
}
.desc {
  line-height: 1.8;
  font-size: 14px;
  color: #555;
  padding-top: 10px;
}
</style>
</head>
<body>

<h2>etcd 集群写入数据流向</h2>
<div class="container">
  <div class="flow-box">
    <!-- 业务节点 -->
    <div class="node n1" style="top:20px;left:15px;">客户端 / Controller</div>
    <div class="node n2" style="top:20px;left:200px;">K8s APIServer</div>

    <!-- etcd 集群 -->
    <div class="node n3" style="top:130px;left:400px;">etcd Leader 主节点</div>
    <div class="node n4" style="top:30px;left:650px;">etcd Follower 从节点</div>
    <div class="node n4" style="top:220px;left:650px;">etcd Follower 从节点</div>

    <!-- 存储层 -->
    <div class="node n5" style="top:270px;left:400px;">WAL日志 + 快照持久化</div>

    <!-- 连线 -->
    <div class="line" id="l1" style="top:38px;left:110px;width:85px;"></div>
    <div class="line" id="l2" style="top:38px;left:285px;width:90px;"></div>
    <div class="line" id="l3" style="top:135px;left:520px;width:120px;transform:rotate(-18deg);"></div>
    <div class="line" id="l4" style="top:155px;left:520px;width:120px;transform:rotate(15deg);"></div>
    <div class="line" id="l5" style="top:205px;left:445px;width:2px;height:65px;"></div>
  </div>

  <div class="btn-group">
    <button class="btn-blue" onclick="stepPlay()">逐步演示</button>
    <button class="btn-gray" onclick="resetAll()">重置</button>
  </div>

  <div class="desc">
    <strong>流程说明：</strong><br>
    1. 客户端、控制器所有资源变更请求，统一提交至 APIServer；<br>
    2. APIServer 只与 etcd Leader 通信，保证写入入口唯一；<br>
    3. Leader 先写入 WAL 预写日志，再通过 Raft 协议同步给所有从节点；<br>
    4. 集群超过半数节点同步完成，事务才算提交成功；<br>
    5. 数据落地本地磁盘，定时生成快照，清理冗余日志。
  </div>
</div>

<script>
// 流程顺序
const lineArr = ["l1","l2","l5","l3","l4"];
let now = 0;

// 清空所有高亮
function clearLine(){
  lineArr.forEach(id=>{
    document.getElementById(id).classList.remove("on");
  })
}

// 分步播放
function stepPlay(){
  clearLine();
  if(now >= lineArr.length) now = 0;
  document.getElementById(lineArr[now]).classList.add("on");
  now++;
}

// 重置
function resetAll(){
  now = 0;
  clearLine();
}
</script>

</body>
</html>

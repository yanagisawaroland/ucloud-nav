<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>备忘录 - 域名单击直接打开</title>
<style>
* {margin: 0;padding: 0;box-sizing: border-box;}
body {background: #f8fafc;padding: 20px;font-family: Microsoft YaHei,sans-serif;}
.container {max-width: 1100px;margin: 0 auto;}
h2 {color: #1e293b;margin-bottom: 16px;text-align: center;}
/* 关键修复：允许内部链接点击 */
.content-box {
  width: 100%;
  height: 620px;
  padding: 16px;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.8;
  background: #fff;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-y: auto;
  user-modify: read-write;
}
.content-box a {
  color: #165DFF;
  text-decoration: none;
  cursor: pointer;
  /* 核心关键：强制允许点击超链接 */
  pointer-events: auto !important;
}
.content-box a:hover {
  text-decoration: underline;
  color: #0E42D2;
}
.btn-group {margin-top: 15px;text-align: center;gap: 12px;display: flex;justify-content: center;}
button {padding: 9px 28px;border: none;border-radius: 6px;font-size: 14px;cursor: pointer;}
.btn-save {background: #165DFF;color: #fff;}
.btn-refresh {background: #64748b;color: #fff;}
</style>
</head>
<body>
<div class="container">
  <h2>备忘录｜域名单击直接打开（修复版）</h2>
  <div class="content-box" id="memoContent" contenteditable="true"></div>
  <div class="btn-group">
    <button class="btn-save" onclick="saveMemo()">💾 保存</button>
    <button class="btn-refresh" onclick="loadMemo()">🔄 刷新</button>
  </div>
</div>
<script>
function linkify(text){
  const reg=/(https?:\/\/[^\s]+)|([a-zA-Z0-9\-]+\.[a-zA-Z0-9\-\.]+)/g;
  return text.replace(reg,url=>{
    let href=url.startsWith('http')?url:`https://${url}`;
    return `<a target="_blank" href="${href}">${url}</a>`;
  });
}
async function loadMemo(){
  const res=await fetch("/memo-load");
  const text=await res.text();
  document.getElementById("memoContent").innerHTML=linkify(text);
}
async function saveMemo(){
  const pureText=document.getElementById("memoContent").innerText;
  await fetch("/memo-save",{method:"POST",body:pureText});
  alert("✅ 修复完成｜链接直接单击打开");
}
window.onload=loadMemo;
</script>
</body>
</html>

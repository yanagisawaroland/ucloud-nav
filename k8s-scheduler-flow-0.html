<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>K8s调度流程动态图 - 明亮版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #eef2f7 0%, #d9e2ec 100%);
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            padding: 1.8rem 1.5rem 2rem 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1e3c72, #2b4c7c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        h1 small {
            font-size: 0.8rem;
            background: #e9f0f9;
            color: #1e6faf;
            padding: 0.2rem 0.7rem;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: normal;
        }

        .sub {
            color: #2c5a7a;
            margin-top: 0.3rem;
            font-size: 0.9rem;
            border-left: 3px solid #3b82f6;
            padding-left: 0.8rem;
        }

        .canvas-container {
            background: #f8fafc;
            border-radius: 1.8rem;
            margin: 1.5rem 0 1.2rem 0;
            padding: 0.6rem;
            box-shadow: inset 0 1px 4px rgba(0, 0, 0, 0.05), 0 6px 12px -6px rgba(0, 0, 0, 0.1);
            border: 1px solid #cbd5e1;
            overflow-x: auto;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 1rem;
            width: 100%;
            height: auto;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 1.2rem 0 1rem 0;
        }

        .btn {
            background: #ffffff;
            border: 1px solid #b9c7d9;
            color: #1f3a5f;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-primary {
            background: linear-gradient(95deg, #2563eb, #3b82f6);
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background: linear-gradient(95deg, #1d4ed8, #2563eb);
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.3);
        }

        .btn:hover {
            background: #eef3fc;
            border-color: #3b82f6;
            color: #1e3a8a;
        }

        .status-panel {
            background: #f1f5f9;
            border-radius: 1.2rem;
            padding: 1rem 1.5rem;
            border: 1px solid #cbd5e1;
            margin-top: 0.8rem;
            backdrop-filter: blur(4px);
        }

        .step-info {
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 10px;
        }

        .current-step {
            font-weight: 600;
            background: #e9f0f9;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-family: monospace;
            font-size: 0.9rem;
            color: #0369a1;
            border-left: 3px solid #3b82f6;
        }

        .step-desc {
            color: #2c3e66;
            font-size: 0.95rem;
        }

        .legend {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
            font-size: 0.7rem;
            color: #4a627a;
            justify-content: center;
        }

        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge-active {
            width: 12px;
            height: 12px;
            background: #eab308;
            border-radius: 20px;
            box-shadow: 0 0 5px #fde047;
        }

        .flow-dot {
            width: 12px;
            height: 12px;
            background: #0d9488;
            border-radius: 20px;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #5c6f8c;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap;">
        <div>
            <h1>
                ☸️ K8s 调度流程动态图
                <small>Scheduler Workflow</small>
            </h1>
            <div class="sub">动态粒子演示 —— Pod 创建 → 调度核心 → 绑定至最佳节点（明亮主题）</div>
        </div>
        <div class="legend">
            <span>🔵 静态节点</span>
            <span>🌟 <span class="badge-active"></span> 高亮激活节点</span>
            <span>💨 <span class="flow-dot"></span> 动态粒子流向</span>
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="k8sCanvas" width="1300" height="460" style="width:100%; height:auto; max-width:1300px; aspect-ratio:1300/460"></canvas>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="playBtn">▶ 动态演示调度流程</button>
        <button class="btn" id="resetBtn">⟳ 重置 & 重播</button>
    </div>

    <div class="status-panel">
        <div class="step-info">
            <div class="current-step" id="stepName">⚙️ 等待启动</div>
            <div class="step-desc" id="stepDesc">点击「动态演示」观察调度器核心步骤，粒子沿箭头移动</div>
        </div>
    </div>
    <footer>
        📌 流程说明：API Server (Pod创建) → Scheduler 监听未调度Pod → 预选(Predicates)过滤节点 → 优选(Priorities)打分排序 → 绑定(Binding) → kubelet启动容器
    </footer>
</div>

<script>
    (function() {
        // ---------- 节点定义 (浅色风格，矩形) ----------
        const canvas = document.getElementById('k8sCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 1300;
        canvas.height = 460;

        // 节点坐标（水平布局）
        const nodes = [
            { id: 0, name: "API Server", sub: "Pod 创建", desc: "创建未调度Pod\n写入etcd", x: 80, y: 180, width: 150, height: 78 },
            { id: 1, name: "Scheduler", sub: "监听队列", desc: "watch未绑定Pod\n触发调度流程", x: 290, y: 180, width: 150, height: 78 },
            { id: 2, name: "预选 (Predicates)", sub: "过滤阶段", desc: "剔除不满足资源、\n亲和性等节点", x: 500, y: 180, width: 160, height: 78 },
            { id: 3, name: "优选 (Priorities)", sub: "打分排序", desc: "资源均衡/亲和性\n综合评分", x: 710, y: 180, width: 160, height: 78 },
            { id: 4, name: "Binding", sub: "绑定操作", desc: "更新Pod与节点\n绑定关系", x: 920, y: 180, width: 150, height: 78 },
            { id: 5, name: "目标Node", sub: "kubelet运行", desc: "拉取镜像 & 启动\n业务容器", x: 1120, y: 180, width: 150, height: 78 }
        ];

        // 获取线段端点 (右侧中心 -> 左侧中心)
        function getEdgePoints(fromNode, toNode) {
            const fromRight = {
                x: fromNode.x + fromNode.width,
                y: fromNode.y + fromNode.height / 2
            };
            const toLeft = {
                x: toNode.x,
                y: toNode.y + toNode.height / 2
            };
            return { start: fromRight, end: toLeft };
        }

        // 构建线段集
        const segments = [];
        for (let i = 0; i < nodes.length - 1; i++) {
            const { start, end } = getEdgePoints(nodes[i], nodes[i+1]);
            segments.push({
                fromIdx: i,
                toIdx: i+1,
                start: { x: start.x, y: start.y },
                end: { x: end.x, y: end.y }
            });
        }

        // 步骤描述文字
        const stepDescriptions = [
            { title: "📡 API Server 接收请求", detail: "kubectl 创建 Pod → API Server 存储至 etcd，Pod 状态为 Pending 且未分配节点" },
            { title: "👁️ Scheduler 监听未调度 Pod", detail: "Scheduler 通过 informer 机制 watch 到未绑定 nodeName 的 Pod，加入调度队列" },
            { title: "⚙️ 预选阶段 (Predicates)", detail: "过滤节点：检查资源是否充足、端口冲突、节点亲和性、污点容忍等，筛选出可用节点" },
            { title: "📊 优选阶段 (Priorities)", detail: "对过滤后节点进行打分 (资源平衡、镜像本地性等)，选出最优节点 (最高分)" },
            { title: "🔗 Binding 绑定", detail: "Scheduler 向 API Server 发送绑定请求，将 Pod 与目标节点绑定，记录 pod.spec.nodeName" },
            { title: "🐳 Kubelet 启动容器", detail: "目标节点的 kubelet 监听到绑定事件，调用容器运行时创建 Pod 及容器，完成调度！" }
        ];

        // 动画状态
        let animationId = null;
        let isMoving = false;
        let currentSegmentIndex = 0;
        let t = 0;
        const MOVE_DURATION = 650;
        const STEP_DELAY = 700;
        let timeoutId = null;
        let activeHighlightNode = -1;
        let extraHighlightFrom = -1;
        let extraHighlightTo = -1;
        let flowCompleted = false;
        let playing = false;
        let currentParticlePos = null;
        let movingSegment = null;

        // 停止所有动画
        function stopAnimationAndTimers() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            isMoving = false;
            playing = false;
        }

        // 重置流程
        function resetFlow(keepPlayingFlag = false) {
            stopAnimationAndTimers();
            currentSegmentIndex = 0;
            t = 0;
            isMoving = false;
            flowCompleted = false;
            playing = false;
            activeHighlightNode = -1;
            extraHighlightFrom = -1;
            extraHighlightTo = -1;
            if (segments.length > 0) {
                const firstSeg = segments[0];
                currentParticlePos = { x: firstSeg.start.x, y: firstSeg.start.y };
                movingSegment = null;
            } else {
                currentParticlePos = { x: nodes[0].x + nodes[0].width, y: nodes[0].y + nodes[0].height/2 };
            }
            document.getElementById('stepName').innerHTML = '🔄 已重置';
            document.getElementById('stepDesc').innerHTML = '点击「动态演示调度流程」重新观看调度粒子动画';
            drawCanvas();
        }

        // 开始演示
        function startDemo() {
            if (playing) return;
            resetFlow();
            playing = true;
            flowCompleted = false;
            currentSegmentIndex = 0;
            t = 0;
            isMoving = false;
            activeHighlightNode = -1;
            extraHighlightFrom = -1;
            extraHighlightTo = -1;
            const firstSeg = segments[0];
            currentParticlePos = { x: firstSeg.start.x, y: firstSeg.start.y };
            drawCanvas();
            moveToNextSegment();
        }

        function moveToNextSegment() {
            if (!playing) return;
            if (currentSegmentIndex >= segments.length) {
                flowCompleted = true;
                playing = false;
                isMoving = false;
                activeHighlightNode = nodes.length-1;
                extraHighlightFrom = -1;
                extraHighlightTo = -1;
                document.getElementById('stepName').innerHTML = '✅ 调度完成';
                document.getElementById('stepDesc').innerHTML = 'Pod 成功运行在目标节点！K8s 调度流程结束。';
                drawCanvas();
                return;
            }

            const seg = segments[currentSegmentIndex];
            movingSegment = seg;
            extraHighlightFrom = seg.fromIdx;
            extraHighlightTo = seg.toIdx;
            activeHighlightNode = -1;

            if (currentSegmentIndex < stepDescriptions.length) {
                const stepInfo = stepDescriptions[currentSegmentIndex];
                document.getElementById('stepName').innerHTML = `🚀 ${stepInfo.title}`;
                document.getElementById('stepDesc').innerHTML = stepInfo.detail;
            } else {
                document.getElementById('stepName').innerHTML = `📌 步骤 ${currentSegmentIndex+1}/${segments.length}`;
                document.getElementById('stepDesc').innerHTML = `调度器执行关键操作 → 从 ${nodes[seg.fromIdx].name} 到 ${nodes[seg.toIdx].name}`;
            }
            startParticleMove(seg);
        }

        function startParticleMove(segment) {
            if (isMoving) return;
            isMoving = true;
            t = 0;
            const startTime = performance.now();
            const startPos = segment.start;
            const endPos = segment.end;

            function animateMove(now) {
                const elapsed = now - startTime;
                let progress = Math.min(1, elapsed / MOVE_DURATION);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const curX = startPos.x + (endPos.x - startPos.x) * easeProgress;
                const curY = startPos.y + (endPos.y - startPos.y) * easeProgress;
                currentParticlePos = { x: curX, y: curY };
                drawCanvas();
                if (progress < 1) {
                    animationId = requestAnimationFrame(animateMove);
                } else {
                    currentParticlePos = { x: endPos.x, y: endPos.y };
                    drawCanvas();
                    isMoving = false;
                    if (timeoutId) clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        currentSegmentIndex++;
                        extraHighlightFrom = -1;
                        extraHighlightTo = -1;
                        const arrivedNodeIdx = segments[currentSegmentIndex-1]?.toIdx;
                        if (arrivedNodeIdx !== undefined) activeHighlightNode = arrivedNodeIdx;
                        drawCanvas();
                        timeoutId = setTimeout(() => {
                            activeHighlightNode = -1;
                            drawCanvas();
                            moveToNextSegment();
                        }, 180);
                    }, STEP_DELAY);
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animateMove);
        }

        // 绘图函数 (明亮风格，取消深色，画布背景纯白)
        function drawArrow(ctx, from, to, color = '#4b7db3', lineWidth = 2.5, dashed = false) {
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(from.x, from.y);
            ctx.lineTo(to.x, to.y);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            if (dashed) {
                ctx.setLineDash([8, 6]);
            } else {
                ctx.setLineDash([]);
            }
            ctx.stroke();
            const angle = Math.atan2(to.y - from.y, to.x - from.x);
            const arrowSize = 10;
            const arrowX = to.x;
            const arrowY = to.y;
            ctx.beginPath();
            ctx.moveTo(arrowX, arrowY);
            ctx.lineTo(arrowX - arrowSize * 0.7 * Math.cos(angle - Math.PI/6), arrowY - arrowSize * 0.7 * Math.sin(angle - Math.PI/6));
            ctx.lineTo(arrowX - arrowSize * 0.7 * Math.cos(angle + Math.PI/6), arrowY - arrowSize * 0.7 * Math.sin(angle + Math.PI/6));
            ctx.fillStyle = color;
            ctx.fill();
            ctx.setLineDash([]);
            ctx.restore();
        }

        function drawNode(ctx, node, isActive, isHighLightExtra = false) {
            const { x, y, width, height, name, sub, desc } = node;
            let bgColor;
            let borderColor;
            let textColorDark;
            if (isActive || isHighLightExtra) {
                bgColor = '#fef9c3';   // 柔和淡黄
                borderColor = '#eab308';
                textColorDark = '#854d0e';
            } else {
                bgColor = '#f9fafb';
                borderColor = '#cbd5e1';
                textColorDark = '#1e293b';
            }
            ctx.fillStyle = bgColor;
            ctx.shadowBlur = 2;
            ctx.shadowColor = 'rgba(0,0,0,0.05)';
            ctx.fillRect(x, y, width, height);
            ctx.shadowBlur = 0;
            ctx.strokeStyle = borderColor;
            ctx.lineWidth = 1.8;
            ctx.strokeRect(x, y, width, height);

            ctx.font = 'bold 14px "Segoe UI", system-ui';
            ctx.fillStyle = textColorDark;
            ctx.fillText(name, x + 12, y + 24);
            ctx.font = '11px monospace';
            ctx.fillStyle = '#4b5563';
            ctx.fillText(sub, x + 12, y + 45);
            ctx.font = '9px "Segoe UI"';
            ctx.fillStyle = '#5b6e8c';
            const lines = desc.split('\n');
            let lineY = y + 62;
            for(let line of lines) {
                ctx.fillText(line, x + 12, lineY);
                lineY += 12;
            }
        }

        function drawParticle(ctx, pos) {
            if (!pos) return;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 8, 0, Math.PI*2);
            ctx.fillStyle = '#0d9488';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#2dd4bf';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 4, 0, Math.PI*2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 11, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(13,148,136,0.2)';
            ctx.fill();
        }

        function drawAllLines(ctx) {
            for (let i=0; i<segments.length; i++) {
                const seg = segments[i];
                const isActiveLine = (movingSegment === seg && isMoving) || (extraHighlightFrom === seg.fromIdx && extraHighlightTo === seg.toIdx);
                const lineColor = isActiveLine ? '#eab308' : '#3b82f6';
                const width = isActiveLine ? 3.2 : 2.2;
                drawArrow(ctx, seg.start, seg.end, lineColor, width, false);
            }
        }

        function drawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 纯白背景 + 浅灰极简网格
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 0.8;
            for (let i=0; i<canvas.width; i+=40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            ctx.restore();

            drawAllLines(ctx);

            for(let i=0; i<nodes.length; i++) {
                const node = nodes[i];
                let highlight = false;
                if (activeHighlightNode === i) highlight = true;
                if (extraHighlightFrom === i || extraHighlightTo === i) highlight = true;
                drawNode(ctx, node, highlight, false);
            }

            if (currentParticlePos && (!flowCompleted || (flowCompleted && !playing))) {
                drawParticle(ctx, currentParticlePos);
            } else if (flowCompleted && !playing && nodes.length>0) {
                const lastNode = nodes[nodes.length-1];
                const endPos = { x: lastNode.x + lastNode.width - 8, y: lastNode.y + lastNode.height/2 };
                drawParticle(ctx, endPos);
            }
        }

        // 按钮绑定
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        playBtn.addEventListener('click', () => {
            if (playing) return;
            stopAnimationAndTimers();
            resetFlow();
            startDemo();
        });
        
        resetBtn.addEventListener('click', () => {
            stopAnimationAndTimers();
            resetFlow();
            playing = false;
            flowCompleted = false;
            drawCanvas();
            document.getElementById('stepName').innerHTML = '⏸️ 已重置 · 准备就绪';
            document.getElementById('stepDesc').innerHTML = '点击「动态演示调度流程」重新观看完整 K8s 调度链路';
        });
        
        resetFlow();
        drawCanvas();
        window.addEventListener('resize', () => drawCanvas());
    })();
</script>
</body>
</html>

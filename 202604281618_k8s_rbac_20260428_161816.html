<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>K8s RBAC 权限模型 · 流程动态图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f2f5f9;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:28px 12px 60px;
}

h1{font-size:21px;font-weight:700;color:#1a2540;margin-bottom:5px;text-align:center;letter-spacing:.5px}
.sub{font-size:12.5px;color:#8a9ab8;margin-bottom:18px;text-align:center}

/* ── controls ── */
.ctrl{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;align-items:center}
.btn{padding:6px 16px;border:none;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;transition:all .18s}
.bp{background:#3560d0;color:#fff}.bp:hover{background:#2040a8}
.bs{background:#fff;color:#3a4a60;border:1.2px solid #ccd4e4}.bs:hover{background:#e8eef8;border-color:#3560d0}
.br{background:#edf0f6;color:#5a6a80;border:1.2px solid #ccd4e4}.br:hover{background:#dce2ee}
.sp{font-size:12px;color:#8a9ab8}
.tab-wrap{display:flex;gap:6px;margin-left:6px}
.tab{padding:5px 12px;border-radius:6px;border:1.2px solid #ccd4e4;background:#fff;font-size:12px;cursor:pointer;color:#3a4a60;transition:all .15s}
.tab.on{background:#3560d0;color:#fff;border-color:#3560d0}

/* ── canvas ── */
.wrap{background:#fff;border-radius:16px;box-shadow:0 3px 22px rgba(0,0,0,.09);padding:24px 18px 20px;width:100%;max-width:920px;overflow-x:auto}

/* ── dots ── */
.dots{display:flex;gap:6px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;background:#dde4f0;cursor:pointer;transition:background .25s}
.dot.on{background:#3560d0}

/* ── info ── */
.info{margin-top:12px;font-size:12.5px;color:#5a6a80;text-align:center;min-height:40px;line-height:1.75;max-width:880px}

/* ── SVG animation ── */
.ng{opacity:0;transition:opacity .45s,transform .45s;transform:translateY(8px)}
.ng.v{opacity:1;transform:translateY(0)}
.cg{opacity:0;transition:opacity .38s}
.cg.v{opacity:1}

/* ── legend ── */
.legend{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;font-size:12px;color:#5a6a80}
.litem{display:flex;align-items:center;gap:5px}
.lbox{width:14px;height:14px;border-radius:3px}

@keyframes dash{to{stroke-dashoffset:-18}}
.flow-dash{stroke-dasharray:6 4;animation:dash 1.2s linear infinite}
</style>
</head>
<body>

<h1>Kubernetes RBAC 权限模型</h1>
<p class="sub">User / ServiceAccount → Role / ClusterRole → RoleBinding → 资源访问</p>

<div class="ctrl">
  <button class="btn bp" id="btnPlay" onclick="togglePlay()">▶ 播放</button>
  <button class="btn bs" onclick="stepFwd()">→ 下一步</button>
  <button class="btn bs" onclick="stepBk()">← 上一步</button>
  <button class="btn br" onclick="doReset()">↺ 重置</button>
  <span class="sp">速度</span>
  <button class="btn bs" onclick="spd=1400">慢</button>
  <button class="btn bs" onclick="spd=800">中</button>
  <button class="btn bs" onclick="spd=380">快</button>
  <div class="tab-wrap">
    <span class="sp">场景</span>
    <button class="tab on" id="t0" onclick="setScene(0)">命名空间级</button>
    <button class="tab"    id="t1" onclick="setScene(1)">集群级</button>
    <button class="tab"    id="t2" onclick="setScene(2)">拒绝访问</button>
  </div>
</div>

<div class="legend">
  <div class="litem"><div class="lbox" style="background:#dbeafe;border:1.2px solid #3b82f6"></div>主体 Subject</div>
  <div class="litem"><div class="lbox" style="background:#fef3c7;border:1.2px solid #d97706"></div>角色 Role</div>
  <div class="litem"><div class="lbox" style="background:#ede9fe;border:1.2px solid #7c3aed"></div>绑定 Binding</div>
  <div class="litem"><div class="lbox" style="background:#dcfce7;border:1.2px solid #16a34a"></div>资源 Resource</div>
  <div class="litem"><div class="lbox" style="background:#fee2e2;border:1.2px solid #dc2626"></div>拒绝 Deny</div>
</div>

<script>
const SCENES = {
  0:{
    label:'场景：开发者读取 default 命名空间 Pods',
    subjectLeft:'👤 dev-user (User)',subjectRight:'—',
    roleLeft:'📋 pod-reader (Role)',roleRight:'—',
    binding:'RoleBinding: dev-pod-reader-binding',
    verbs:'get · list · watch',
    resources:'pods',
    result:'allow',
    steps_info:[
      '【kube-apiserver】dev-user 发起 kubectl get pods -n default 请求，进入鉴权流程',
      '【主体识别】解析 kubeconfig 中的 X.509 证书，确认主体为 User: dev-user',
      '【查找 Binding】在 default namespace 找到 RoleBinding: dev-pod-reader-binding，subjects 包含 dev-user',
      '【引用 Role】RoleBinding.roleRef → Role: pod-reader，namespace: default',
      '【解析 Rules】rules: [{apiGroups:[""],resources:["pods"],verbs:["get","list","watch"]}]',
      '【鉴权匹配】请求动词 get + 资源 pods 命中 rules → 鉴权通过',
      '【访问结果】✅ 允许，返回 default namespace 下 Pod 列表 | ❌ 拒绝路径不适用',
      '【资源操作】Pod 数据返回给 dev-user，kubectl 显示 Pod 列表',
      '【审计闭环】所有请求写入 audit log，RBAC 规则持续生效'
    ]
  },
  1:{
    label:'场景：CI/CD ServiceAccount 集群级部署权限',
    subjectLeft:'—',subjectRight:'🤖 ci-sa (ServiceAccount)',
    roleLeft:'—',roleRight:'🌐 deployer (ClusterRole)',
    binding:'ClusterRoleBinding: ci-deployer-binding',
    verbs:'get · list · create · update · patch',
    resources:'deployments · services · configmaps',
    result:'allow',
    steps_info:[
      '【kube-apiserver】Pod 内 CI 程序使用挂载的 ServiceAccount Token 发起 API 请求',
      '【主体识别】Token 解析为 ServiceAccount: ci-sa，namespace: ci-system',
      '【查找 Binding】找到 ClusterRoleBinding: ci-deployer-binding，subjects 含 ci-sa',
      '【引用 ClusterRole】ClusterRoleBinding.roleRef → ClusterRole: deployer（集群全局生效）',
      '【解析 Rules】rules: 允许对 deployments/services/configmaps 执行 get/list/create/update/patch',
      '【鉴权匹配】请求动词 + 资源 命中 ClusterRole rules → 跨 namespace 鉴权通过',
      '【访问结果】✅ 允许跨命名空间部署 | ❌ 无 ClusterRole 则 403',
      '【资源操作】CI 程序成功更新 Deployment，触发滚动升级',
      '【审计闭环】集群级操作全量写入 audit log，可追溯'
    ]
  },
  2:{
    label:'场景：未授权用户尝试访问 Secrets',
    subjectLeft:'👤 intern-user (User)',subjectRight:'—',
    roleLeft:'📋 pod-reader (Role，仅pods)',roleRight:'—',
    binding:'RoleBinding: intern-binding（无 secrets 权限）',
    verbs:'get · list（仅pods）',
    resources:'secrets（未授权）',
    result:'deny',
    steps_info:[
      '【kube-apiserver】intern-user 尝试 kubectl get secrets -n default，进入鉴权',
      '【主体识别】证书解析为 User: intern-user',
      '【查找 Binding】找到 RoleBinding: intern-binding，subjects 含 intern-user',
      '【引用 Role】roleRef → Role: pod-reader，rules 仅包含 pods 资源',
      '【解析 Rules】rules: [{resources:["pods"],verbs:["get","list"]}]，无 secrets 条目',
      '【鉴权不匹配】请求资源 secrets 未在 rules 中出现 → RBAC 默认拒绝（Deny-by-default）',
      '【访问结果】❌ 403 Forbidden，secrets 数据不返回 | ✅ 路径不适用',
      '【资源操作】Secrets 访问被阻断，数据安全',
      '【审计闭环】拒绝事件写入 audit log，可触发告警'
    ]
  }
};

const STEP_IDS = ['s0','s1','s2','s3','s4','s5','s6','s7','s8'];
const CONN_IDS = [null,'c01','c12','c23','c34','c45','c56','c67',null];

let cur=-1, playing=false, timer=null, spd=900, scene=0;

const dotsEl=document.getElementById('dots');
const infoEl=document.getElementById('info');
const btnPlay=document.getElementById('btnPlay');

STEP_IDS.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot';d.onclick=()=>jumpTo(i);dotsEl.appendChild(d);
});

function updDots(){dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===cur));}

function applyScene(sc){
  const s=SCENES[sc];
  // scene label
  const lbl=document.getElementById('scene-lbl');
  lbl.textContent=s.label;lbl.setAttribute('opacity','1');
  // flow line
  const fl=document.getElementById('flow-ok');
  fl.setAttribute('opacity', s.result==='allow'?'1':'0');
  // deny box highlight
  const denyRect=document.querySelector('#s6 rect:nth-child(3)');
  if(denyRect){
    denyRect.setAttribute('fill', s.result==='deny'?'#fca5a5':'#fee2e2');
    denyRect.setAttribute('stroke', s.result==='deny'?'#b91c1c':'#dc2626');
    denyRect.setAttribute('stroke-width', s.result==='deny'?'2.2':'1.3');
  }
  const allowRect=document.querySelector('#s6 rect:nth-child(1)');
  if(allowRect){
    allowRect.setAttribute('fill', s.result==='allow'?'#86efac':'#dcfce7');
    allowRect.setAttribute('stroke', s.result==='allow'?'#15803d':'#16a34a');
    allowRect.setAttribute('stroke-width', s.result==='allow'?'2.2':'1.3');
  }
}

function showStep(idx){
  if(idx<0||idx>=STEP_IDS.length)return;
  document.getElementById(STEP_IDS[idx]).classList.add('v');
  if(CONN_IDS[idx]){const el=document.getElementById(CONN_IDS[idx]);if(el)el.classList.add('v');}
  if(idx>=6)applyScene(scene);
  infoEl.textContent=SCENES[scene].steps_info[idx];
  cur=idx;updDots();
}

function jumpTo(idx){
  if(idx<=cur)return;
  for(let i=cur+1;i<=idx;i++)showStep(i);
}
function stepFwd(){stopPlay();if(cur<STEP_IDS.length-1)showStep(cur+1);}
function stepBk(){
  stopPlay();
  if(cur<=0){doReset();return;}
  const t=cur-1;doReset(true);
  for(let i=0;i<=t;i++)showStep(i);
}
function doReset(silent){
  stopPlay();
  document.querySelectorAll('.ng,.cg').forEach(el=>el.classList.remove('v'));
  document.getElementById('scene-lbl').setAttribute('opacity','0');
  document.getElementById('flow-ok').setAttribute('opacity','0');
  cur=-1;updDots();
  if(!silent)infoEl.textContent='选择场景后点击「播放」，或使用「下一步」逐节点浏览 RBAC 鉴权流程';
}
function togglePlay(){
  if(playing)stopPlay();else startPlay();
}
function startPlay(){
  playing=true;btnPlay.textContent='⏸ 暂停';
  function nx(){
    if(cur>=STEP_IDS.length-1){stopPlay();return;}
    showStep(cur+1);timer=setTimeout(nx,spd);
  }
  timer=setTimeout(nx,cur===-1?200:spd);
}
function stopPlay(){playing=false;clearTimeout(timer);btnPlay.textContent='▶ 播放';}

function setScene(n){
  scene=n;
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',i===n));
  doReset(false);
}
</script>
</body>
</html>
